# AAA — theaaa.xyz (apex + www). Mirrors app.visualisa.xyz proxy rules.
# Install:
#   sudo cp deploy/theaaa.xyz.conf /etc/nginx/sites-available/theaaa.xyz
#   sudo ln -s /etc/nginx/sites-available/theaaa.xyz /etc/nginx/sites-enabled/theaaa.xyz
#   sudo nginx -t && sudo systemctl reload nginx
# Then (only after theaaa.xyz resolves to this server's IP):
#   sudo certbot --nginx -d theaaa.xyz -d www.theaaa.xyz --redirect --agree-tos -m 0xmilenov@gmail.com -n
# certbot will add the 443 block + HTTP->HTTPS redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name theaaa.xyz www.theaaa.xyz;

    # Backend contract API (rewritten path), matching the visualisa vhost
    location /api/contract/ {
        proxy_pass http://127.0.0.1:8000/contract/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth routes -> Next frontend
    location /auth {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Public backend API endpoints -> backend :8000 (exact mirror of the visualisa vhost;
    # other endpoints like /landingStats reach the backend via the Next frontend's rewrite)
    location ~ ^/(getAddressesByFilter|getContractCount|getVerifiedContractStats|networkCounts|nativePrices|searchByCode|addContract|bookmarks|health) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> Next frontend :3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
